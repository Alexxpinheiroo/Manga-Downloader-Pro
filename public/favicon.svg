<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ffbbe" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131b2e" />
      <stop offset="100%" stop-color="#060e20" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Shield/Container -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bgGrad)" stroke="#3c4a42" stroke-width="1.5" />
  
  <!-- Stylized Manga Pages / M shape -->
  <path d="M 14 20 L 25 14 L 32 19 L 39 14 L 50 20 L 50 42 L 39 37 L 32 41 L 25 37 L 14 42 Z" 
        fill="none" 
        stroke="url(#emeraldGrad)" 
        stroke-width="3" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
        
  <!-- Center Book Spine / Divider -->
  <line x1="32" y1="19" x2="32" y2="41" stroke="#4edea3" stroke-width="2" stroke-dasharray="1 1" />
  
  <!-- High Tech Download Arrow overlapping center -->
  <g filter="url(#glow)">
    <path d="M 32 22 L 32 46 M 24 38 L 32 47 L 40 38" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="3.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    <path d="M 32 22 L 32 46 M 24 38 L 32 47 L 40 38" 
          fill="none" 
          stroke="url(#emeraldGrad)" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
  
  <!-- Tech Accent Dot -->
  <circle cx="50" cy="14" r="2.5" fill="#6ffbbe" />
</svg>
